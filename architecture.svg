<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8f4fd"/>
      <stop offset="1" stop-color="#d0ebf9"/>
    </linearGradient>
    <linearGradient id="lin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="conn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#93c5fd"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">系统架构</text>

  <!-- ==================== LEFT BOX ==================== -->
  <rect x="30" y="55" width="320" height="440" rx="10" fill="url(#win)" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="55" width="320" height="40" rx="10" fill="#2563eb"/>
  <rect x="30" y="75" width="320" height="20" fill="#2563eb"/>
  <text x="80" y="80" fill="#fff" font-size="14" font-weight="700">Exchange 服务器（Windows）</text>

  <text x="55" y="120" font-size="13" fill="#334155" font-weight="600">GetMailbox.ps1</text>
  <text x="55" y="142" font-size="12" fill="#475569">- 按数据库逐个查询 9000+ 邮箱</text>
  <text x="55" y="162" font-size="12" fill="#475569">- 导出 CSV（带时间戳留历史）</text>
  <text x="55" y="182" font-size="12" fill="#475569">- 导出 JSON + 汇总（推送用）</text>

  <line x1="50" y1="200" x2="330" y2="200" stroke="#cbd5e1" stroke-width="1"/>

  <text x="55" y="222" font-size="13" fill="#334155" font-weight="600">AD 用户信息</text>
  <text x="55" y="244" font-size="12" fill="#475569">Get-ADUser -Properties Department,</text>
  <text x="55" y="260" font-size="12" fill="#475569">Enabled, WhenCreated</text>

  <line x1="50" y1="278" x2="330" y2="278" stroke="#cbd5e1" stroke-width="1"/>

  <text x="55" y="300" font-size="13" fill="#334155" font-weight="600">日志记录</text>
  <text x="55" y="320" font-size="12" fill="#475569">- 日志目录: D:\Log\</text>
  <text x="55" y="336" font-size="12" fill="#475569">- 每步耗时 + 推送结果</text>
  <text x="55" y="352" font-size="12" fill="#475569">- 自动保留 30 天</text>

  <line x1="50" y1="370" x2="330" y2="370" stroke="#cbd5e1" stroke-width="1"/>

  <text x="55" y="392" font-size="13" fill="#334155" font-weight="600">计划任务</text>
  <text x="55" y="412" font-size="12" fill="#475569">- 每天 06:00 自动运行</text>
  <text x="55" y="428" font-size="12" fill="#475569">- 无推送则仅本地导出</text>

  <!-- Schedule icon -->
  <rect x="260" y="428" width="75" height="24" rx="12" fill="#93c5fd"/>
  <text x="297" y="444" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">定时触发</text>

  <!-- ==================== MIDDLE ARROW ==================== -->
  <line x1="350" y1="180" x2="610" y2="180" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="8,4"/>
  <polygon points="610,172 625,180 610,188" fill="#2563eb"/>
  <rect x="400" y="145" width="170" height="24" rx="12" fill="#dbeafe"/>
  <text x="485" y="162" text-anchor="middle" font-size="12" fill="#1d4ed8" font-weight="600">HTTPS 推送</text>
  <text x="485" y="210" text-anchor="middle" font-size="11" fill="#64748b">每天 06:00 定时推送</text>
  <text x="485" y="226" text-anchor="middle" font-size="11" fill="#64748b">JSON 格式, UTF-8 编码</text>

  <!-- ==================== RIGHT BOX ==================== -->
  <rect x="610" y="55" width="320" height="440" rx="10" fill="url(#lin)" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="610" y="55" width="320" height="40" rx="10" fill="#16a34a"/>
  <rect x="610" y="75" width="320" height="20" fill="#16a34a"/>
  <text x="660" y="80" fill="#fff" font-size="14" font-weight="700">前端服务器（Linux）</text>

  <rect x="640" y="105" width="260" height="60" rx="8" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="655" y="125" font-size="13" fill="#334155" font-weight="600">Nginx（端口 443）</text>
  <text x="655" y="145" font-size="12" fill="#475569">域名: https://mailbox-report.company.com</text>

  <line x1="665" y1="172" x2="685" y2="172" stroke="#16a34a" stroke-width="2"/>
  <polygon points="690,168 700,172 690,176" fill="#16a34a"/>

  <rect x="640" y="185" width="260" height="60" rx="8" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="655" y="205" font-size="13" fill="#334155" font-weight="600">反向代理</text>
  <text x="655" y="225" font-size="12" fill="#475569">→ 127.0.0.1:3099</text>

  <line x1="665" y1="252" x2="685" y2="252" stroke="#16a34a" stroke-width="2"/>
  <polygon points="690,248 700,252 690,256" fill="#16a34a"/>

  <rect x="640" y="265" width="260" height="60" rx="8" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="655" y="285" font-size="13" fill="#334155" font-weight="600">Node.js（127.0.0.1:3099）</text>
  <text x="655" y="305" font-size="12" fill="#475569">提供 API 和静态文件服务</text>

  <line x1="665" y1="332" x2="685" y2="332" stroke="#16a34a" stroke-width="2"/>
  <polygon points="690,328 700,332 690,336" fill="#16a34a"/>

  <rect x="640" y="345" width="260" height="50" rx="8" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="655" y="365" font-size="13" fill="#334155" font-weight="600">data/mailboxes.json</text>
  <text x="655" y="383" font-size="12" fill="#475569">存储推送的邮箱数据</text>

  <line x1="665" y1="402" x2="685" y2="402" stroke="#16a34a" stroke-width="2"/>
  <polygon points="690,398 700,402 690,406" fill="#16a34a"/>

  <!-- User access -->
  <rect x="640" y="415" width="260" height="45" rx="22" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="700" y="435" font-size="13" fill="#1e40af" font-weight="600">用户浏览器访问仪表板</text>
  <text x="700" y="451" font-size="11" fill="#1e40af">搜索 · 排序 · 筛选 · 导出</text>
</svg>

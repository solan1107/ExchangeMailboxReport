# ============================================================
# Exchange 邮箱仪表板 - Nginx 反向代理配置
# 部署位置: /etc/nginx/sites-available/mailbox-report
# 使用方法:
#   1. 修改 server_name 为你的域名
#   2. 配置 SSL 证书路径
#   3. 软链到 sites-enabled
#   4. nginx -t && systemctl reload nginx
# ============================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name mailbox-report.yourcompany.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mailbox-report.yourcompany.com;

    # ─── SSL 证书 ────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/mailbox-report/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/mailbox-report/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ─── 上传大小限制（10MB 足够容纳 9000+ 封邮件数据）────
    client_max_body_size 50m;

    # ─── 日志 ─────────────────────────────────────────
    access_log /var/log/nginx/mailbox-report.access.log;
    error_log  /var/log/nginx/mailbox-report.error.log;

    # ─── 反向代理到 Node.js 后端 ──────────────────────
    location / {
        proxy_pass http://127.0.0.1:3099;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
